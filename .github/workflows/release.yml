name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@9a59e15a74545c99a626ba594edcd0d02189e670 # main at 2026-03-20T13:57:34Z
        with:
          summarize: false

      - name: Build Image
        run: |
          nix build .#docker-image
          ./result > ${{ runner.temp }}/image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docker-image
          path: ${{ runner.temp }}/image.tar
          retention-days: 1

  release-please:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker:
    name: Docker
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image
          path: ${{ runner.temp }}

      - name: Load Image
        run: docker load < ${{ runner.temp }}/image.tar

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          docker tag ghcr.io/eternisai/attestation-server:latest ghcr.io/eternisai/attestation-server:${TAG}
          docker push ghcr.io/eternisai/attestation-server:${TAG}

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign Image
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/eternisai/attestation-server:${TAG})
          cosign sign --yes "${digest}"
