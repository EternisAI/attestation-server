# Attestation server configuration

[log]
format = "json"   # json, text
level  = "info"   # debug, info, warn, error

[server]
host = "0.0.0.0"
port = 8187

[paths]
build_info   = "/etc/build-info.json"
endorsements = "/etc/endorsements.json"

[report]
evidence = ["nitronsm"]  # required, non-empty; allowed: nitronsm, nitrotpm

[report.user_data]
env = []  # optional; environment variable names to include

[tls.public]
cert_path = ""
key_path  = ""

[tls.private]
cert_path = ""
key_path  = ""
